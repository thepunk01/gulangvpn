name: Build Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            build-cmd: cd src-tauri && cargo tauri build --no-bundle
            artifact: src-tauri/target/release/bundle/msi/*.msi
            artifact-name: windows-installer
          - platform: macos
            runner: macos-latest
            build-cmd: cd src-tauri && cargo tauri build --no-bundle
            artifact: src-tauri/target/release/bundle/dmg/*.dmg
            artifact-name: macos-app
          - platform: android
            runner: ubuntu-22.04
            build-cmd: flutter build apk --release
            artifact: build/app/outputs/flutter-apk/*.apk
            artifact-name: android-apk
          - platform: linux
            runner: ubuntu-22.04
            build-cmd: cd src-tauri && cargo tauri build --no-bundle
            artifact: src-tauri/target/release/bundle/deb/*.deb
            artifact-name: linux-deb

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        if: matrix.platform == 'android'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Setup Node
        if: matrix.platform == 'android'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Flutter deps
        if: matrix.platform == 'android'
        run: |
          cd src
          npm install -g pnpm
          pnpm install
          cd ..
          flutter pub get

      - name: Install Rust
        if: matrix.platform != 'android'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91

      - name: Cache Cargo
        if: matrix.platform != 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsoup-3.0-dev libwebkitgtk-6.0-dev libglu1-mesa clang ninja-build pkg-config

      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.build-cmd }}
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact }}
          retention-days: 14
